<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SVoltix Pulse · Acesso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:           #080f1c;
  --bg-soft:      #0c1526;
  --panel:        #101c30;
  --panel-border: #1e3050;
  --text:         #e8edf7;
  --text-muted:   #6e88aa;
  --accent:       #5eead4;
  --accent-dim:   rgba(94,234,212,0.10);
  --accent-glow:  rgba(94,234,212,0.20);
  --danger:       #f87171;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  /* fundo com grid sutil */
  background-image:
    radial-gradient(circle at 20% 10%, rgba(94,234,212,0.07) 0%, transparent 45%),
    radial-gradient(circle at 80% 90%, rgba(94,234,212,0.04) 0%, transparent 40%),
    linear-gradient(var(--panel-border) 1px, transparent 1px),
    linear-gradient(90deg, var(--panel-border) 1px, transparent 1px);
  background-size: 100% 100%, 100% 100%, 48px 48px, 48px 48px;
  background-color: var(--bg);
}

/* ── CARD ── */
.card {
  width: 100%;
  max-width: 380px;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  padding: 40px 36px;
  box-shadow: 0 24px 64px rgba(0,0,0,.5), 0 0 0 1px rgba(94,234,212,.04);
  position: relative;
  overflow: hidden;
}

/* linha decorativa no topo */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: .6;
}

/* ── BRAND ── */
.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
}

.logo-ring {
  width: 60px; height: 60px;
  border-radius: 16px;
  background: var(--accent-dim);
  border: 1px solid rgba(94,234,212,.3);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 24px var(--accent-glow);
}
.logo-ring svg { width: 28px; height: 28px; }

.brand-text { text-align: center; }

.brand-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: .01em;
  color: var(--text);
  line-height: 1;
}

.brand-pulse {
  display: inline-block;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-top: 4px;
  opacity: .8;
}

.brand-sub {
  margin-top: 6px;
  font-size: 13px;
  color: var(--text-muted);
}

/* ── FORM ── */
.field { margin-bottom: 18px; }

.field-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.input-wrap { position: relative; }

.input-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  width: 15px; height: 15px;
  color: var(--text-muted);
  pointer-events: none;
  transition: color .15s;
}

.field:focus-within .input-icon { color: var(--accent); }

input[type=text],
input[type=password] {
  width: 100%;
  padding: 12px 42px;
  background: var(--bg-soft);
  border: 1px solid var(--panel-border);
  border-radius: 11px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color .15s, background .15s, box-shadow .15s;
}
input::placeholder { color: var(--text-muted); }
input:focus {
  border-color: var(--accent);
  background: var(--bg);
  box-shadow: 0 0 0 3px var(--accent-dim);
}

.eye-btn {
  position: absolute;
  right: 10px; top: 50%;
  transform: translateY(-50%);
  width: 32px; height: 32px;
  background: transparent; border: none;
  color: var(--text-muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 7px;
  transition: color .15s, background .15s;
}
.eye-btn:hover { color: var(--accent); background: var(--accent-dim); }
.eye-btn svg { width: 15px; height: 15px; }

/* ── ENTER BUTTON ── */
.btn-enter {
  width: 100%;
  margin-top: 4px;
  padding: 14px;
  background: var(--accent);
  color: #05131f;
  border: none;
  border-radius: 11px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .03em;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background .15s, box-shadow .15s, transform .05s;
}
.btn-enter:hover {
  background: #80f2df;
  box-shadow: 0 0 20px rgba(94,234,212,.35);
}
.btn-enter:active { transform: scale(.99); }
.btn-enter:disabled { opacity: .55; cursor: default; }

.spinner {
  width: 15px; height: 15px;
  border: 2px solid rgba(5,19,31,.25);
  border-top-color: #05131f;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}
.btn-enter.loading .spinner  { display: block; }
.btn-enter.loading .btn-label { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── MENSAGEM ── */
.msg {
  min-height: 20px;
  margin-top: 14px;
  font-size: 13px;
  text-align: center;
  color: var(--danger);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.msg svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ── FOOTER ── */
.login-footer {
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid var(--panel-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.footer-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-muted);
  letter-spacing: .06em;
  text-transform: uppercase;
}
.footer-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  animation: blink 2.5s ease-in-out infinite;
}
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.3; } }

.footer-version {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-muted);
  opacity: .5;
}

@media (max-width: 400px) {
  .card { padding: 30px 22px; }
}
</style>
</head>
<body>

<div class="card">

  <!-- Linha topo decorativa já no ::before -->

  <div class="brand">
    <div class="logo-ring">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M13 2L4 14H11L10 22L20 10H13L14 2Z"
              stroke="#5eead4" stroke-width="1.7"
              stroke-linejoin="round"
              fill="rgba(94,234,212,0.15)"/>
      </svg>
    </div>
    <div class="brand-text">
      <div class="brand-name">SVoltix</div>
      <div class="brand-pulse">Pulse</div>
      <div class="brand-sub">Painel de monitoramento energético</div>
    </div>
  </div>

  <div class="field">
    <label class="field-label" for="usuario">Usuário</label>
    <div class="input-wrap">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none">
        <path d="M20 21v-1a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="1.6"/>
      </svg>
      <input id="usuario" type="text" placeholder="Digite seu usuário" autocomplete="username">
    </div>
  </div>

  <div class="field">
    <label class="field-label" for="senha">Senha</label>
    <div class="input-wrap">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none">
        <rect x="4" y="11" width="16" height="9" rx="2" stroke="currentColor" stroke-width="1.6"/>
        <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <input id="senha" type="password" placeholder="Digite sua senha" autocomplete="current-password">
      <button class="eye-btn" onclick="toggleSenha()" title="Mostrar senha" type="button">
        <svg id="iconeOlho" viewBox="0 0 24 24" fill="none">
          <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>
        </svg>
      </button>
    </div>
  </div>

  <button class="btn-enter" id="btnEntrar" onclick="login()">
    <span class="btn-label">Entrar</span>
    <span class="spinner"></span>
  </button>

  <div class="msg" id="msg"></div>

  <div class="login-footer">
    <div class="footer-badge">Sistema ativo</div>
    <div class="footer-version">v2.0.0</div>
  </div>

</div>

<script>
const API = 'https://evidence-spider-inclusive-venice.trycloudflare.com';

function toggleSenha() {
  const campo = document.getElementById('senha');
  const icone = document.getElementById('iconeOlho');
  const visible = campo.type === 'text';
  campo.type = visible ? 'password' : 'text';
  icone.innerHTML = visible
    ? `<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>`
    : `<path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.36 18.36 0 0 1 4.18-4.94" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M9.9 4.24A10.4 10.4 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M14.12 14.12A3 3 0 1 1 9.88 9.88" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>`;
}

function setMsg(texto) {
  const el = document.getElementById('msg');
  if (!texto) { el.innerHTML = ''; return; }
  el.innerHTML = `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.6"/><line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="16" r="1" fill="currentColor"/></svg>${texto}`;
}

async function login() {
  const btn      = document.getElementById('btnEntrar');
  const usuario  = document.getElementById('usuario').value.trim();
  const senha    = document.getElementById('senha').value.trim();

  setMsg('');

  if (!usuario || !senha) { setMsg('Preencha usuário e senha.'); return; }

  btn.disabled = true;
  btn.classList.add('loading');

  try {
    const res  = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ usuario, senha })
    });
    const data = await res.json();

    if (data.sucesso) {
      localStorage.setItem('logado', 'sim');
      localStorage.setItem('usuario', data.usuario || usuario);
      localStorage.setItem('svoltix_api', API);
      location.href = 'dashboard.html';
    } else {
      setMsg('Usuário ou senha inválidos.');
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  } catch {
    setMsg('Erro de conexão com o servidor.');
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

['usuario','senha'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
});
</script>

</body>
</html>
