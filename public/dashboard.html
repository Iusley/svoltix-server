<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SVoltix Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<style>

/* Layout inspirado no LiteMe (header + side menu + área de conteúdo) */

.layout{
    display:flex;
    gap:18px;
    align-items:stretch;
    margin-top:18px;
}

.side-menu{
    width:250px;
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:16px;
    padding:18px;
    height:fit-content;
}

.side-brand{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
}

.side-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:18px;
}

.side-section-label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin:16px 0 10px;
    padding-bottom:8px;
    border-bottom:1px solid var(--panel-border);
}

.side-item{
    width:100%;
    background:transparent;
    border:1px solid transparent;
    color:var(--text-muted);
    padding:10px 12px;
    border-radius:10px;
    cursor:pointer;
    font-weight:700;
    font-size:13px;
    font-family:inherit;
    text-align:left;
    transition:background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
}

.side-item:hover{
    background:rgba(94,234,212,0.06);
    border-color:rgba(94,234,212,0.15);
    color:var(--text);
}

.side-item.active{
    background:rgba(94,234,212,0.10);
    border-color:rgba(94,234,212,0.35);
    color:var(--text);
}

.side-user{
    font-size:13px;
    color:var(--text-muted);
    margin-bottom:10px;
    font-weight:700;
}

.side-logout{
    width:100%;
    margin-top:10px;
    background:transparent;
    border:1px solid rgba(248,113,113,0.35);
    color:var(--danger);
    padding:10px 12px;
    border-radius:10px;
    cursor:pointer;
    font-weight:800;
    font-size:13px;
    font-family:inherit;
    transition:background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
}

.side-logout:hover{
    background:rgba(248,113,113,0.10);
    border-color:var(--danger-hover);
}

.content{
    flex:1;
    min-width:0;
}

.content-header{
    margin-bottom:12px;
}

.content-body{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:16px;
    padding:18px;
}

.historico-toolbar{
    display:flex;
    gap:10px;
    align-items:flex-end;
    flex-wrap:wrap;
    margin-bottom:12px;
}

.field-row{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-muted);
}

.select{
    background:var(--bg-soft);
    border:1px solid var(--panel-border);
    color:var(--text);
    padding:10px 12px;
    border-radius:10px;
    min-width:220px;
    outline:none;
}

.btn-primary{
    background:var(--accent);
    color:#04141f;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    font-weight:900;
    cursor:pointer;
    transition:background 0.15s ease, transform 0.05s ease;
}

.btn-primary:hover{ background:#7ff3df; }
.btn-primary:active{ transform:scale(0.99); }

.hist-list{
    margin-top:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.hist-item{
    background:var(--bg-soft);
    border:1px solid var(--panel-border);
    border-radius:12px;
    padding:14px 14px;
}

.hist-item-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:10px;
}

.hist-device{
    font-weight:900;
}

.hist-time{
    font-family:'JetBrains Mono',monospace;
    color:var(--text-muted);
    font-size:11px;
}

.hist-grid{
    display:grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap:10px;
}

.hist-kv{
    background:rgba(94,234,212,0.06);
    border:1px solid rgba(94,234,212,0.12);
    border-radius:10px;
    padding:10px;
}

.hist-k{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-muted);
}

.hist-v{
    margin-top:6px;
    font-weight:900;
    color:var(--accent);
    font-family:'JetBrains Mono',monospace;
}

@media (max-width:980px){
    body{ padding:24px 14px; }
    .layout{ flex-direction:column; }
    .side-menu{ width:100%; }
}

@media (max-width:480px){
    .hist-grid{ grid-template-columns:1fr; }
}

:root{
    --bg: #0b1220;
    --bg-soft: #0f1a2e;
    --panel: #121d33;
    --panel-border: #223252;
    --text: #e7edf7;
    --text-muted: #8ea0bd;
    --accent: #5eead4;
    --accent-soft: rgba(94,234,212,0.12);
    --online: #34d399;
    --warning: #fbbf24;
    --offline: #f87171;
    --danger: #f87171;
    --danger-hover: #ef4444;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',Arial,sans-serif;
    background:
        radial-gradient(circle at 15% 0%, rgba(94,234,212,0.08), transparent 40%),
        radial-gradient(circle at 85% 100%, rgba(94,234,212,0.05), transparent 45%),
        var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:32px 20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:18px;
    padding:32px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:28px;
    gap:16px;
    flex-wrap:wrap;
}

.brand{
    display:flex;
    align-items:center;
    gap:12px;
}

.brand-mark{
    width:42px;
    height:42px;
    border-radius:10px;
    background:var(--accent-soft);
    border:1px solid rgba(94,234,212,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}

.brand-mark svg{
    width:22px;
    height:22px;
}

h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:24px;
    font-weight:700;
    letter-spacing:0.01em;
    color:var(--text);
    line-height:1.2;
}

.subtitle{
    color:var(--text-muted);
    font-size:13px;
    margin-top:2px;
    display:flex;
    align-items:center;
    gap:8px;
}

.live-dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--online);
    box-shadow:0 0 0 0 rgba(52,211,153,0.6);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%   { box-shadow:0 0 0 0 rgba(52,211,153,0.55); }
    70%  { box-shadow:0 0 0 6px rgba(52,211,153,0); }
    100% { box-shadow:0 0 0 0 rgba(52,211,153,0); }
}

.topbar-right{
    display:flex;
    align-items:center;
    gap:14px;
}

#usuarioLogado{
    font-size:13px;
    color:var(--text-muted);
    text-align:right;
}

#usuarioLogado b{
    color:var(--text);
    font-weight:600;
}

.logout{
    background:transparent;
    color:var(--danger);
    border:1px solid rgba(248,113,113,0.4);
    border-radius:8px;
    padding:9px 18px;
    cursor:pointer;
    font-size:13px;
    font-weight:600;
    font-family:inherit;
    transition:background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
}

.logout:hover{
    background:rgba(248,113,113,0.1);
    border-color:var(--danger-hover);
    color:#fca5a5;
}

.section-label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin-bottom:14px;
    padding-bottom:10px;
    border-bottom:1px solid var(--panel-border);
}

.equipamentos-grid{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.grupo{
    background:var(--bg-soft);
    border:1px solid var(--panel-border);
    border-radius:12px;
    overflow:hidden;
}

.grupo-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 18px;
    cursor:pointer;
    user-select:none;
    transition:background 0.15s ease;
}

.grupo-header:hover{
    background:rgba(94,234,212,0.04);
}

.grupo-header-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.chevron{
    width:16px;
    height:16px;
    color:var(--text-muted);
    transition:transform 0.2s ease;
    flex-shrink:0;
}

.grupo.collapsed .chevron{
    transform:rotate(-90deg);
}

.grupo.collapsed .grupo-body{
    max-height:0;
}

.grupo-icon{
    width:18px;
    height:18px;
    color:var(--text-muted);
    flex-shrink:0;
}

.grupo-nome{
    font-weight:600;
    font-size:14px;
    color:var(--text);
}

.grupo-edit-btn{
    width:28px;
    height:28px;
    border-radius:6px;
    border:none;
    background:transparent;
    color:var(--text-muted);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition:background 0.15s ease, color 0.15s ease;
}

.grupo-edit-btn:hover{
    background:var(--accent-soft);
    color:var(--accent);
}

.grupo-edit-btn svg{
    width:14px;
    height:14px;
}

.grupo-nome-input{
    font-family:inherit;
    font-weight:600;
    font-size:14px;
    color:var(--text);
    background:var(--panel);
    border:1px solid var(--accent);
    border-radius:6px;
    padding:4px 8px;
    outline:none;
    width:180px;
}

.grupo-resumo{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-muted);
    text-transform:uppercase;
    letter-spacing:0.06em;
}

.grupo-resumo.online{ color:var(--online); background:none; box-shadow:none; }
.grupo-resumo.warning{ color:var(--warning); background:none; box-shadow:none; }
.grupo-resumo.offline{ color:var(--offline); background:none; box-shadow:none; }

.grupo-body{
    max-height:200px;
    transition:max-height 0.25s ease;
}

.equipamento{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 18px 16px 46px;
    border-top:1px solid var(--panel-border);
    transition:background 0.15s ease;
}

.equipamento:hover{
    background:rgba(94,234,212,0.03);
}

.info{
    display:flex;
    align-items:center;
    gap:14px;
}

.status{
    width:10px;
    height:10px;
    border-radius:50%;
    flex-shrink:0;
}

.online{
    background:var(--online);
    box-shadow:0 0 0 3px rgba(52,211,153,0.18);
}

.warning{
    background:var(--warning);
    box-shadow:0 0 0 3px rgba(251,191,36,0.18);
}

.offline{
    background:var(--offline);
    box-shadow:0 0 0 3px rgba(248,113,113,0.18);
}

.nome{
    font-weight:600;
    color:var(--text);
    font-size:15px;
}

.status-text{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-muted);
    text-transform:uppercase;
    letter-spacing:0.08em;
}

.valor{
    font-family:'JetBrains Mono',monospace;
    font-size:20px;
    font-weight:600;
    color:var(--accent);
}

.empty, .erro{
    padding:40px 20px;
    text-align:center;
    color:var(--text-muted);
    font-size:14px;
}

.erro{
    color:var(--danger);
}

@media (max-width:480px){
    .card{ padding:22px; }
    .topbar{ flex-direction:column; }
    .topbar-right{ width:100%; justify-content:space-between; }
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="topbar">

<div class="brand">

<div class="brand-mark">
<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M13 2L4 14H11L10 22L20 10H13L14 2Z" stroke="#5eead4" stroke-width="1.6" stroke-linejoin="round" fill="rgba(94,234,212,0.15)"/>
</svg>
</div>

<div>
<h1>SVoltix</h1>
<div class="subtitle">
<span class="live-dot"></span>
Monitoramento em tempo real
</div>
</div>

</div>

<div class="topbar-right">
<div id="usuarioLogado"></div>
<button class="logout" onclick="sair()">Sair</button>
</div>

</div>

<!-- Layout LiteMe-like: header + menu lateral + área de conteúdo -->
<div class="layout">

<div class="side-menu" id="sideMenu">
    <div class="side-brand">
        <span class="side-title">SVoltix</span>
    </div>

    <div class="side-section-label">Navegação</div>

    <button class="side-item active" id="tab-dashboard" onclick="selecionarTab('dashboard')">Dashboard</button>
    <button class="side-item" id="tab-historico" onclick="selecionarTab('historico')">Histórico</button>
    <button class="side-item" id="tab-config" onclick="selecionarTab('config')">Configurações</button>

    <div class="side-section-label">Usuário</div>
    <div class="side-user" id="usuarioLogado"></div>
    <button class="side-logout" onclick="sair()">Sair</button>
</div>

<div class="content">
    <div class="content-header">
        <div class="section-label">Dashboard</div>
    </div>

    <div class="content-body">
        <div id="view-dashboard">
            <div class="section-label">Equipamentos</div>
            <div class="equipamentos-grid" id="equipamentos">
                <div class="empty">Carregando equipamentos...</div>
            </div>
        </div>

        <div id="view-historico" style="display:none">
            <div class="section-label">Histórico</div>
            <div class="historico-toolbar">
                <div class="field-row">
                    <label class="label">Dispositivo</label>
                    <select id="selectDevice" class="select"></select>
                </div>
                <button class="btn-primary" onclick="carregarHistorico()">Carregar</button>
            </div>
            <div class="empty" id="historicoEmpty">Selecione um dispositivo.</div>
            <div class="hist-list" id="historicoList"></div>
        </div>

        <div id="view-config" style="display:none">
            <div class="section-label">Configurações</div>
            <div class="empty">Em breve.</div>
        </div>
    </div>
</div>

</div>

</div>

</div>

<script>

if(localStorage.getItem("logado") != "sim")
{
    location.href = "index.html";
}

document.getElementById(
    "usuarioLogado"
).innerHTML =
"<b>Usuário:</b> " +
localStorage.getItem("usuario");

const gruposColapsados =
    new Set();

let nomesGrupos = {};

let editandoGrupoId = null;

const API =
'https://evidence-spider-inclusive-venice.trycloudflare.com';

function toggleGrupo(grupoId)
{
    const el =
        document.getElementById(
            grupoId);

    if(!el) return;

    if(gruposColapsados.has(
        grupoId))
    {
        gruposColapsados.delete(
            grupoId);

        el.classList.remove(
            "collapsed");
    }
    else
    {
        gruposColapsados.add(
            grupoId);

        el.classList.add(
            "collapsed");
    }
}

function editarNomeGrupo(
    dispositivo,
    grupoId)
{
    editandoGrupoId = grupoId;

    const nomeAtual =
        nomesGrupos[dispositivo]
        || dispositivo;

    const span =
        document.getElementById(
            "nome-" + grupoId);

    if(!span) return;

    const input =
        document.createElement(
            "input");

    input.type = "text";
    input.className =
        "grupo-nome-input";
    input.value = nomeAtual;

    input.onclick = e =>
        e.stopPropagation();

    input.onkeydown = e =>
    {
        if(e.key === "Enter")
        {
            input.blur();
        }
        if(e.key === "Escape")
        {
            input.value =
                nomeAtual;

            input.blur();
        }
    };

    input.onblur = () =>
        salvarNomeGrupo(
            dispositivo,
            grupoId,
            input.value
                .trim()
                || dispositivo);

    span.replaceWith(input);

    input.focus();

    input.select();
}

async function salvarNomeGrupo(
    dispositivo,
    grupoId,
    novoNome)
{
    editandoGrupoId = null;

    nomesGrupos[dispositivo] =
        novoNome;

    const span =
        document.createElement(
            "span");

    span.id =
        "nome-" + grupoId;

    span.className =
        "grupo-nome";

    span.textContent =
        novoNome;

    const input =
        document.getElementById(
            "nome-" + grupoId);

    if(input)
    {
        input.replaceWith(span);
    }

    try
    {
    await fetch(
    `${API}/grupos`,

    {
                method: "POST",
                headers:
                {
                    "Content-Type":
                    "application/json"
                },
                body:
                JSON.stringify({
                    dispositivo:
                        dispositivo,
                    nome_grupo:
                        novoNome
                })
            });
    }
    catch(error)
    {
        console.error(
            "Erro ao salvar nome do grupo:",
            error);
    }
}

async function carregarNomesGrupos()
{
    try
    {
        const response =
        await fetch(`${API}/grupos`);

        const dados =
            await response.json();

        nomesGrupos = {};

        dados.forEach(item =>
        {
            nomesGrupos[item.dispositivo] =
                item.nome_grupo;
        });
    }
    catch(error)
    {
        console.error(
            "Erro ao carregar nomes dos grupos:",
            error);
    }
}

async function atualizar()
{

    console.log("ATUALIZANDO");

    if(editandoGrupoId !== null)
    {
        return;
    }

    try
    {
        const response =
        await fetch(`${API}/api/dashboard`);

        const dados =
            await response.json();

        const dispositivos = {};

        dados.forEach(item =>
        {
            if(!dispositivos[item.device])
            {
                dispositivos[item.device] = item;
            }
        });

        let html = "";

        Object.values(
            dispositivos
        ).forEach(item =>
        {
            const ultimoContato =
                new Date(
                    item.created_at);

            const agora =
                new Date();

            const segundos =
                (agora -
                ultimoContato) /
                1000;

            console.log(
                item.device,
                item.created_at,
                segundos
            );

            let statusClass;
            let statusLabel;

            if(segundos < 30)
            {
                statusClass = "online";
                statusLabel = "Online";
            }
            else if(segundos < 60)
            {
                statusClass = "warning";
                statusLabel = "Atenção";
            }
            else
            {
                statusClass = "offline";
                statusLabel = "Offline";
            }

            const grupoId =
                "grupo-" +
                 item.device
                    .replace(/[^a-zA-Z0-9]/g, "");

            const dispositivoEscapado =
                item.device
                    .replace(/'/g, "\\'");

            const collapsedClass =
                gruposColapsados.has(
                    grupoId)
                ? " collapsed"
                : "";

            html += `
            <div class="grupo${collapsedClass}" id="${grupoId}">

                <div class="grupo-header" onclick="toggleGrupo('${grupoId}')">

                    <div class="grupo-header-left">

                        <svg class="chevron" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>

                        <svg class="grupo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3 9.5L12 3L21 9.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1V9.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        </svg>

                        <span class="grupo-nome" id="nome-${grupoId}">
                            ${nomesGrupos[item.device] || item.device}
                        </span>

                        <button class="grupo-edit-btn" onclick="event.stopPropagation(); editarNomeGrupo('${dispositivoEscapado}', '${grupoId}')" title="Renomear grupo">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 20h9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>

                    </div>

                    <div class="grupo-resumo ${statusClass}">
                        ${statusLabel}
                    </div>

                </div>

                <div class="grupo-body">

                    <div class="equipamento">

                        <div class="info">

                            <div class="status ${statusClass}">
                            </div>

                            <div>
                                <div class="nome">
                                    ${item.device}
                                </div>
                                <div class="status-text">
                                    VA: ${Number(item.va).toFixed(1)}V |
                                    IA: ${Number(item.ia).toFixed(1)}A |
                                    FP: ${Number(item.fpt).toFixed(3)}
                                </div>
                            </div>

                        </div>

                        <div class="valor">

                            ${Number(item.pt).toFixed(0)} W

                            <div style="
                                font-size:11px;
                                color:#8ea0bd;
                                margin-top:6px;
                                line-height:1.5;
                                text-align:right;
                            ">
                                VA: ${Number(item.va).toFixed(1)}V<br>
                                IA: ${Number(item.ia).toFixed(1)}A<br>
                                FP: ${Number(item.fpt).toFixed(3)}
                            </div>

                        </div>

                    </div>

                </div>

            </div>
            `;
        });

        if(html === "")
        {
            html =
            "<div class=\"empty\">Nenhum equipamento encontrado.</div>";
        }

        document.getElementById(
            "equipamentos"
        ).innerHTML = html;
    }
    catch(error)
    {
        console.error(error);

        document.getElementById(
            "equipamentos"
        ).innerHTML =
        "<div class=\"erro\">Erro ao consultar o servidor.</div>";
    }
}

function sair()
{
    localStorage.clear();
    location.href = "index.html";
}

function selecionarTab(tab)
{
    // remove active
    document.querySelectorAll('.side-item').forEach(btn => btn.classList.remove('active'));

    if(tab === 'dashboard')
    {
        document.getElementById('tab-dashboard').classList.add('active');
        document.getElementById('view-dashboard').style.display = 'block';
        document.getElementById('view-historico').style.display = 'none';
        document.getElementById('view-config').style.display = 'none';
        document.querySelector('.content-header .section-label').textContent = 'Dashboard';
    }
    else if(tab === 'historico')
    {
        document.getElementById('tab-historico').classList.add('active');
        document.getElementById('view-dashboard').style.display = 'none';
        document.getElementById('view-historico').style.display = 'block';
        document.getElementById('view-config').style.display = 'none';
        document.querySelector('.content-header .section-label').textContent = 'Histórico';
        carregarDispositivosParaHistorico();
    }
    else
    {
        document.getElementById('tab-config').classList.add('active');
        document.getElementById('view-dashboard').style.display = 'none';
        document.getElementById('view-historico').style.display = 'none';
        document.getElementById('view-config').style.display = 'block';
        document.querySelector('.content-header .section-label').textContent = 'Configurações';
    }
}

async function carregarDispositivosParaHistorico()
{
    const sel = document.getElementById('selectDevice');
    const list = document.getElementById('histListWrapper');
    const empty = document.getElementById('historicoEmpty');

    if(!sel) return;

    try
    {
        sel.disabled = true;
        empty.textContent = 'Carregando dispositivos...';

        const res = await fetch(`${API}/api/dispositivos`);
        const dados = await res.json();

        sel.innerHTML = '';

        dados.forEach(d =>
        {
            const opt = document.createElement('option');
            opt.value = d.device;
            opt.textContent = d.device;
            sel.appendChild(opt);
        });

        sel.disabled = false;
        empty.textContent = 'Selecione um dispositivo.';

        // limpa lista
        document.getElementById('historicoList').innerHTML = '';
    }
    catch(err)
    {
        console.error(err);
        sel.disabled = false;
        empty.textContent = 'Erro ao carregar dispositivos.';
    }
}

async function carregarHistorico()
{
    const device = document.getElementById('selectDevice').value;
    const historicoList = document.getElementById('historicoList');
    const historicoEmpty = document.getElementById('historicoEmpty');

    if(!device)
    {
        historicoEmpty.style.display = 'block';
        historicoList.innerHTML = '';
        return;
    }

    historicoEmpty.style.display = 'none';
    historicoList.innerHTML = '<div class="empty">Carregando...</div>';

    try
    {
        const res = await fetch(`${API}/api/historico/${encodeURIComponent(device)}`);
        const dados = await res.json();

        if(!dados || dados.length === 0)
        {
            historicoList.innerHTML = '<div class="empty">Sem histórico para este dispositivo.</div>';
            return;
        }

        historicoList.innerHTML = '';

        dados.forEach(item =>
        {
            const t = item.created_at ? new Date(item.created_at).toLocaleString() : '';

            const hist = document.createElement('div');
            hist.className = 'hist-item';
            hist.innerHTML = `
                <div class="hist-item-head">
                    <div class="hist-device">${item.device || device}</div>
                    <div class="hist-time">${t}</div>
                </div>
                <div class="hist-grid">
                    <div class="hist-kv"><div class="hist-k">VA</div><div class="hist-v">${Number(item.va).toFixed(1)} V</div></div>
                    <div class="hist-kv"><div class="hist-k">IA</div><div class="hist-v">${Number(item.ia).toFixed(1)} A</div></div>
                    <div class="hist-kv"><div class="hist-k">PT</div><div class="hist-v">${Number(item.pt).toFixed(0)} W</div></div>
                    <div class="hist-kv"><div class="hist-k">FP</div><div class="hist-v">${Number(item.fpt).toFixed(3)}</div></div>
                    <div class="hist-kv"><div class="hist-k">HZ</div><div class="hist-v">${Number(item.hz).toFixed(2)}</div></div>
                    <div class="hist-kv"><div class="hist-k">TC</div><div class="hist-v">${Number(item.tc).toFixed(2)}</div></div>
                </div>
            `;

            historicoList.appendChild(hist);
        });
    }
    catch(err)
    {
        console.error(err);
        historicoList.innerHTML = '<div class="erro">Erro ao carregar histórico.</div>';
        historicoEmpty.style.display = 'block';
        historicoEmpty.textContent = 'Erro ao consultar o servidor.';
    }
}

// default view
selecionarTab('dashboard');

carregarNomesGrupos().then(
    atualizar);


setInterval(
    atualizar,
    5000);

</script>
