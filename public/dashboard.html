<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVoltix | Monitoramento de Utilidades</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #080f1c;
  --bg-soft: #0c1526;
  --panel: #101c30;
  --panel-2: #13233d;
  --panel-border: #1e3050;
  --text: #e8edf7;
  --text-muted: #8ba1c2;
  --accent: #5eead4;
  --accent-2: #38bdf8;
  --accent-dim: rgba(94,234,212,.11);
  --online: #34d399;
  --warning: #fbbf24;
  --danger: #f87171;
  --orange: #fb6a3d;
  --sidebar-w: 188px;
  --topbar-h: 48px;
  --radius: 8px;
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
  background: #f3f7fb;
  color: #19334f;
  font-size: 13px;
}
button, input, select { font: inherit; }
button { cursor: pointer; }
.app { min-height: 100vh; display: flex; }
.sidebar {
  width: var(--sidebar-w);
  position: fixed;
  inset: 0 auto 0 0;
  background: linear-gradient(180deg, var(--panel), #0b1730);
  color: var(--text);
  display: flex;
  flex-direction: column;
  z-index: 20;
  box-shadow: 8px 0 24px rgba(8,15,28,.16);
}
.brand {
  min-height: 62px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 14px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.mark {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: grid;
  place-items: center;
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid rgba(94,234,212,.28);
}
.mark svg { width: 19px; height: 19px; }
.brand-name { font-size: 21px; font-weight: 800; letter-spacing: .01em; line-height: 1; }
.brand-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.area-switch {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.area-select {
  width: 100%;
  border: 0;
  background: rgba(255,255,255,.04);
  color: var(--text);
  border-radius: var(--radius);
  padding: 9px 10px;
  outline: 0;
}
.nav { padding: 8px 0; flex: 1; overflow: auto; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 36px;
  padding: 0 14px;
  color: var(--text);
  border-left: 3px solid transparent;
  opacity: .88;
}
.nav-item:hover { background: rgba(94,234,212,.08); opacity: 1; }
.nav-item.active {
  background: rgba(94,234,212,.12);
  border-left-color: var(--accent);
  color: var(--accent);
  font-weight: 700;
}
.nav-item svg { width: 15px; height: 15px; flex: 0 0 auto; }
.nav-badge {
  margin-left: auto;
  background: var(--orange);
  color: white;
  border-radius: 7px;
  padding: 3px 7px;
  font-weight: 800;
}
.sidebar-footer {
  padding: 12px 14px;
  border-top: 1px solid rgba(255,255,255,.08);
  display: flex;
  align-items: center;
  gap: 9px;
}
.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent);
  color: #06202c;
  display: grid;
  place-items: center;
  font-weight: 800;
}
.user-meta { min-width: 0; }
.user-meta b { display: block; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-meta span { display: block; font-size: 10px; color: var(--text-muted); }
.main {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  width: calc(100% - var(--sidebar-w));
}
.topbar {
  height: var(--topbar-h);
  background: var(--panel);
  color: var(--text);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 15;
}
.topbar-title { font-weight: 800; letter-spacing: .01em; }
.topbar-sub { color: var(--text-muted); border-left: 1px solid rgba(255,255,255,.16); padding-left: 10px; }
.topbar-spacer { flex: 1; }
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid rgba(94,234,212,.25);
  background: rgba(94,234,212,.1);
  color: var(--accent);
  border-radius: 999px;
  min-height: 24px;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 800;
}
.content { padding: 20px 24px 28px; }
.view { display: none; }
.view.active { display: block; }
.page-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 14px;
}
.title-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
h1 {
  margin: 0;
  font-size: 28px;
  line-height: 1.1;
  font-weight: 600;
  color: #23628f;
}
.title-ico {
  width: 30px; height: 30px; border-radius: 50%;
  background: #23628f;
  color: white;
  display: inline-grid;
  place-items: center;
}
.title-ico svg { width: 17px; height: 17px; }
.toolbar, .filters {
  display: flex;
  align-items: end;
  gap: 8px;
  flex-wrap: wrap;
}
.field { min-width: 160px; flex: 1; }
.field.sm { max-width: 135px; min-width: 120px; }
.label {
  display: block;
  color: #5d6f86;
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  margin: 0 0 4px;
}
.input, .select {
  width: 100%;
  height: 31px;
  border: 1px solid #d5e0eb;
  background: white;
  border-radius: 6px;
  padding: 0 10px;
  color: #223952;
  outline: 0;
}
.input:focus, .select:focus { border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(56,189,248,.12); }
.btn {
  height: 32px;
  border: 0;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 0 14px;
  font-weight: 800;
  color: white;
  background: #23628f;
}
.btn svg { width: 14px; height: 14px; }
.btn:hover { filter: brightness(1.06); }
.btn.accent { background: var(--accent); color: #05202b; }
.btn.orange { background: var(--orange); }
.btn.ghost { background: white; color: #23628f; border: 1px solid #cddceb; }
.btn.icon { width: 34px; padding: 0; }
.seg {
  display: inline-flex;
  background: #dfe9f3;
  border-radius: 999px;
  padding: 2px;
}
.seg button {
  height: 26px;
  border: 0;
  padding: 0 15px;
  border-radius: 999px;
  color: #23628f;
  background: transparent;
  font-weight: 800;
}
.seg button.active { background: var(--panel); color: white; }
.notice {
  min-height: 38px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: #c9ecff;
  color: #23628f;
  border: 1px solid #aee1fb;
  padding: 9px 12px;
  border-radius: 4px;
  margin-bottom: 14px;
}
.notice svg { width: 15px; height: 15px; flex: 0 0 auto; }
.cards { display: grid; gap: 12px; }
.grid-4 { grid-template-columns: repeat(4, minmax(170px, 1fr)); }
.grid-3 { grid-template-columns: repeat(3, minmax(220px, 1fr)); }
.grid-2 { grid-template-columns: repeat(2, minmax(280px, 1fr)); }
.kpi {
  min-height: 88px;
  display: grid;
  grid-template-columns: 58px 1fr;
  overflow: hidden;
  border-radius: var(--radius);
  background: #23628f;
  color: white;
  box-shadow: 0 1px 8px rgba(16,28,48,.16);
}
.kpi .ico {
  background: var(--panel);
  display: grid;
  place-items: center;
}
.kpi .ico svg { width: 27px; height: 27px; color: white; }
.kpi .body { padding: 13px 14px; }
.kpi .label { color: #cce4f8; margin-bottom: 4px; }
.kpi strong { display: block; font-size: 25px; line-height: 1; }
.kpi small { display: block; color: #d8edf9; font-size: 11px; margin-top: 7px; }
.panel {
  background: white;
  border: 1px solid #d8e2ec;
  border-radius: var(--radius);
  box-shadow: 0 1px 7px rgba(16,28,48,.08);
  overflow: hidden;
}
.panel-hd {
  min-height: 40px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  color: #23628f;
  font-weight: 800;
  text-transform: uppercase;
}
.panel-body { padding: 14px; }
.chart-box { height: 255px; position: relative; }
.chart-box.tall { height: 315px; }
.empty {
  display: grid;
  place-items: center;
  min-height: 175px;
  color: #5d6f86;
  text-align: center;
}
.table-wrap { overflow: auto; }
table { width: 100%; border-collapse: collapse; min-width: 760px; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e2ebf3; }
th {
  background: #e7eef6;
  color: #3c4f67;
  text-transform: uppercase;
  font-size: 11px;
  font-weight: 800;
}
tbody tr:nth-child(even) { background: #f4f9fc; }
tbody tr:hover { background: #edf8fb; }
.dashboard-row td { height: 42px; }
.power { color: #23628f; font-weight: 800; white-space: nowrap; }
.power svg { width: 13px; height: 13px; vertical-align: -2px; margin-right: 5px; }
.id-note { display: inline; margin-left: 8px; color: #7890aa; font-size: 11px; }
.status-dot {
  width: 9px; height: 9px; border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
}
.status-dot.online { background: var(--online); }
.status-dot.warning { background: var(--warning); }
.status-dot.offline { background: var(--danger); }
.dashboard-row { cursor: pointer; }
.alert-card {
  background: #23628f;
  color: white;
  border-radius: var(--radius);
  overflow: hidden;
}
.alert-card .alert-hd {
  background: var(--orange);
  padding: 12px 14px;
  font-weight: 800;
  display: flex;
  justify-content: space-between;
}
.alert-card .alert-body { padding: 24px 14px; min-height: 145px; }
.alert-card .alert-foot {
  background: var(--orange);
  padding: 9px 14px;
  display: flex;
  justify-content: space-between;
  font-size: 11px;
}
.gauge-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
.gauge { text-align: center; }
.gauge canvas { max-height: 180px; }
.gauge b { display: block; margin-bottom: 8px; }
.metric-list { display: grid; gap: 0; }
.metric-line {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  padding: 13px 0;
  border-bottom: 1px solid #e4edf5;
}
.metric-line:last-child { border-bottom: 0; }
.metric-line b { color: #23628f; font-size: 16px; }
.tabs { display: flex; gap: 22px; border-bottom: 1px solid #d8e2ec; margin-bottom: 14px; }
.tab {
  padding: 0 0 10px;
  color: #445a72;
  font-weight: 700;
  border-bottom: 2px solid transparent;
}
.tab.active { color: #23628f; border-color: #23628f; }
.form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; align-items: end; }
.billing-table input {
  height: 27px;
  border: 1px solid #cbd9e6;
  border-radius: 5px;
  padding: 0 8px;
}
.tree-layout { display: grid; grid-template-columns: 300px 1fr; gap: 18px; }
.tree {
  background: #e8f0f8;
  border: 1px solid #d3deea;
  border-radius: var(--radius);
  padding: 12px;
  max-height: 560px;
  overflow: auto;
}
.tree-search { margin-bottom: 12px; }
.tree-group { margin: 9px 0; font-weight: 800; color: #23628f; }
.tree-item {
  display: flex;
  align-items: center;
  gap: 7px;
  width: 100%;
  border: 0;
  background: transparent;
  text-align: left;
  padding: 5px 7px 5px 17px;
  border-radius: 5px;
  color: #36506b;
}
.tree-item.active, .tree-item:hover { background: white; }
.cfg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.section-title { color: #23628f; font-size: 18px; margin: 0 0 12px; font-weight: 500; }
.download-layout { display: grid; grid-template-columns: minmax(420px, 1fr) 310px; gap: 18px; align-items: start; }
.radio-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.radio-box {
  background: white;
  border: 1px solid #d8e2ec;
  border-radius: 5px;
  padding: 9px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.summary-row { display: flex; gap: 10px; padding: 12px 0; border-bottom: 1px solid #d8e2ec; }
.summary-row svg { width: 16px; color: #23628f; }
.fab {
  position: fixed;
  right: 26px;
  bottom: 26px;
  width: 48px;
  height: 48px;
  border: 0;
  border-radius: 50%;
  background: var(--panel);
  color: white;
  display: grid;
  place-items: center;
  box-shadow: 0 12px 28px rgba(8,15,28,.28);
  z-index: 25;
}
.fab svg { width: 21px; }
.toast {
  position: fixed;
  right: 24px;
  top: 62px;
  background: var(--panel);
  color: white;
  border: 1px solid var(--panel-border);
  border-radius: 8px;
  padding: 10px 12px;
  opacity: 0;
  transform: translateY(-8px);
  pointer-events: none;
  transition: .18s;
  z-index: 40;
}
.toast.show { opacity: 1; transform: translateY(0); }
.mobile-menu { display: none; }
@media (max-width: 980px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; width: 100%; }
  .mobile-menu { display: inline-flex; }
  .grid-4, .grid-3, .grid-2, .cfg-grid, .download-layout, .tree-layout { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr 1fr; }
  .gauge-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 620px) {
  .content { padding: 16px 12px 24px; }
  .topbar-sub, .pill.hide-sm { display: none; }
  h1 { font-size: 23px; }
  .form-grid, .radio-grid, .gauge-grid { grid-template-columns: 1fr; }
  .kpi { grid-template-columns: 48px 1fr; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M13 2 4 14h7l-1 8 10-12h-7l1-8Z" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round" fill="rgba(94,234,212,.16)"/></svg></div>
      <div><div class="brand-name">SVoltix</div><div class="brand-sub">Monitoramento de Utilidades</div></div>
    </div>
    <div class="area-switch"><select class="area-select" id="areaSelect" onchange="setSelectedDevice(this.value)"><option>Carregando...</option></select></div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-footer">
      <div class="avatar">S</div>
      <div class="user-meta"><b id="userName">IST EFICIENCIA</b><span>Operacao</span></div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="btn icon ghost mobile-menu" onclick="toggleSidebar()" title="Menu"><svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
      <div class="topbar-title">SVoltix</div>
      <div class="topbar-sub" id="breadcrumb">Meus Dashboards</div>
      <div class="topbar-spacer"></div>
      <span class="pill hide-sm">Powered by SVoltix</span>
      <span class="pill" id="livePill"><span class="status-dot online"></span>Online</span>
      <button class="btn icon ghost" onclick="sair()" title="Sair"><svg viewBox="0 0 24 24" fill="none"><path d="M10 17l5-5-5-5M15 12H3M21 4v16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </header>

    <section class="content">
      <div class="view active" id="view-dashboards"></div>
      <div class="view" id="view-home"></div>
      <div class="view" id="view-monitoramento"></div>
      <div class="view" id="view-historico"></div>
      <div class="view" id="view-analise"></div>
      <div class="view" id="view-faturamento"></div>
      <div class="view" id="view-geracao"></div>
      <div class="view" id="view-relatorios"></div>
      <div class="view" id="view-alertas"></div>
      <div class="view" id="view-downloads"></div>
      <div class="view" id="view-config"></div>
    </section>
  </main>
</div>
<button class="fab" onclick="toast('Novo dashboard preparado para cadastro')" title="Adicionar"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
<div class="toast" id="toast"></div>

<script>
const TUNNEL_API = 'https://printer-foot-beauty-spectrum.trycloudflare.com';
const savedApi = localStorage.getItem('svoltix_api');
const API = savedApi && !/localhost|127\.0\.0\.1|\[::1\]|::1/i.test(savedApi) ? savedApi : TUNNEL_API;
localStorage.setItem('svoltix_api', API);
let devices = [];
let historyRows = [];
let charts = {};
let groupNames = {};
let selectedDeviceId = localStorage.getItem('svoltix_device') || '';
let selectedCfgDevice = '';

const icons = {
  home: '<path d="M3 10.5 12 4l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-9.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>',
  clock: '<circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 7v5l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>',
  chart: '<path d="M4 19V5M4 19h17M8 16V9M13 16V6M18 16v-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>',
  search: '<circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>',
  card: '<rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M3 10h18" stroke="currentColor" stroke-width="1.8"/>',
  gear: '<path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="1.8"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.04.04a2 2 0 1 1-2.83 2.83l-.04-.04A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6V20a2 2 0 1 1-4 0v-.06a1.7 1.7 0 0 0-1-.54 1.7 1.7 0 0 0-1.87.34l-.04.04a2 2 0 1 1-2.83-2.83l.04-.04A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1H4a2 2 0 1 1 0-4h.06a1.7 1.7 0 0 0 .54-1 1.7 1.7 0 0 0-.34-1.87l-.04-.04a2 2 0 1 1 2.83-2.83l.04.04A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6V4a2 2 0 1 1 4 0v.06a1.7 1.7 0 0 0 1 .54 1.7 1.7 0 0 0 1.87-.34l.04-.04a2 2 0 1 1 2.83 2.83l-.04.04A1.7 1.7 0 0 0 19.4 9c.22.33.42.66.6 1H20a2 2 0 1 1 0 4h-.06c-.15.36-.33.7-.54 1Z" stroke="currentColor" stroke-width="1.3"/>',
  bell: '<path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7M13.7 21a2 2 0 0 1-3.4 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>',
  download: '<path d="M12 3v12M7 10l5 5 5-5M5 21h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>',
  file: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z" stroke="currentColor" stroke-width="1.8"/><path d="M14 2v6h6" stroke="currentColor" stroke-width="1.8"/>',
  bolt: '<path d="M13 2 4 14h7l-1 8 10-12h-7l1-8Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>',
  calendar: '<rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M16 3v4M8 3v4M3 11h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>'
};
const navItems = [
  ['dashboards','Meus Dashboards','chart'],
  ['home','Home','home'],
  ['monitoramento','Monitoramento','clock'],
  ['historico','Historico','chart'],
  ['analise','Analise','search'],
  ['faturamento','Faturamento','card'],
  ['geracao','Minha Geracao','gear'],
  ['relatorios','Relatorios','file'],
  ['alertas','Alertas','bell','90'],
  ['downloads','Downloads','download'],
  ['config','Configuracoes','gear']
];
function svg(name){ return `<svg viewBox="0 0 24 24" fill="none">${icons[name]}</svg>`; }
function money(v){ return Number(v || 0).toLocaleString('pt-BR', { style:'currency', currency:'BRL' }); }
function num(v, d=0){ return Number(v || 0).toLocaleString('pt-BR', { maximumFractionDigits:d, minimumFractionDigits:d }); }
function kwhFromW(w, hours=24){ return Math.max(0, Number(w || 0) * hours / 1000); }
function today(){ return new Date().toISOString().slice(0,10); }
function brDate(date=today()){ const [y,m,d] = date.slice(0,10).split('-'); return `${d}/${m}/${y}`; }
function deviceId(d){ return d.device || d.dispositivo || d.id || 'SVX-EQUIPAMENTO'; }
function deviceName(d){
  const id = deviceId(d);
  return groupNames[id] || d.nome_grupo || id;
}
function deviceList(){
  return devices.length ? devices : demoDevices();
}
function ensureSelectedDevice(){
  const list = deviceList();
  if (!list.length) return '';
  if (!selectedDeviceId || !list.some(d => deviceId(d) === selectedDeviceId)) {
    selectedDeviceId = deviceId(list[0]);
    localStorage.setItem('svoltix_device', selectedDeviceId);
  }
  return selectedDeviceId;
}
function currentDevice(){
  const id = ensureSelectedDevice();
  return deviceList().find(d => deviceId(d) === id) || deviceList()[0] || {};
}
function setSelectedDevice(id, nextView = null){
  if (!id) return;
  selectedDeviceId = id;
  selectedCfgDevice = id;
  localStorage.setItem('svoltix_device', id);
  renderAll();
  if (nextView) go(nextView);
  else syncSelectionControls();
}
function syncSelectionControls(){
  const id = ensureSelectedDevice();
  ['areaSelect','deviceSelect','histDevice','anaDevice'].forEach(selId => {
    const el = document.getElementById(selId);
    if (el && [...el.options].some(o => o.value === id)) el.value = id;
  });
}
function statusOf(d){
  if (!d.created_at) return 'offline';
  const age = (Date.now() - new Date(d.created_at).getTime()) / 1000;
  if (age < 35) return 'online';
  if (age < 90) return 'warning';
  return 'offline';
}
function statusLabel(s){ return s === 'online' ? 'Online' : s === 'warning' ? 'Atencao' : 'Offline'; }
function totals(){
  const selected = currentDevice();
  const source = selected && deviceId(selected) ? [selected] : deviceList();
  const totalW = source.reduce((s,d)=>s + Number(d.pt || 0), 0);
  const todayKwh = kwhFromW(totalW, 1);
  const monthKwh = kwhFromW(totalW, 24 * 30);
  const fp = source.length ? source.reduce((s,d)=>s + Number(d.fpt || 0),0) / source.length : 0;
  const hz = source.length ? source.reduce((s,d)=>s + Number(d.hz || 0),0) / source.length : 0;
  const tc = source.length ? source.reduce((s,d)=>s + Number(d.tc || 0),0) / source.length : 0;
  return { totalW, todayKwh, monthKwh, forecast: monthKwh * 1.12, fp, hz, tc };
}
function renderAreaSelect(){
  const select = document.getElementById('areaSelect');

  const selected = ensureSelectedDevice();
  select.innerHTML = deviceList().map(d => `<option value="${deviceId(d)}">${deviceName(d)}</option>`).join('');
  if ([...select.options].some(o => o.value === selected)) select.value = selected;
}

function go(id){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${id}`).classList.add('active');
  document.getElementById(`tab-${id}`).classList.add('active');
  document.getElementById('breadcrumb').textContent = navItems.find(i => i[0] === id)?.[1] || id;
  closeSidebar();
  setTimeout(() => resizeCharts(), 80);
}
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); }
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el.t);
  el.t = setTimeout(()=>el.classList.remove('show'), 2200);
}
function destroyChart(id){ if (charts[id]) { charts[id].destroy(); charts[id] = null; } }
function resizeCharts(){ Object.values(charts).forEach(c => c && c.resize()); }
function makeLine(id, labels, datasets, yTitle=''){
  destroyChart(id);
  const el = document.getElementById(id);
  if (!el || !window.Chart) return;
  charts[id] = new Chart(el, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: { legend: { labels: { color:'#445a72' } } },
      scales: {
        x: { grid: { color:'#e1e9f2' }, ticks:{ color:'#5d6f86', maxTicksLimit: 9 } },
        y: { beginAtZero:true, title:{ display:!!yTitle, text:yTitle }, grid: { color:'#e1e9f2' }, ticks:{ color:'#5d6f86' } }
      }
    }
  });
}
function makeGauge(id, value, max=10){
  destroyChart(id);
  const el = document.getElementById(id);
  if (!el || !window.Chart) return;
  charts[id] = new Chart(el, {
    type: 'doughnut',
    data: { datasets: [{ data: [Math.min(value,max), Math.max(max-value,0)], backgroundColor: ['#23628f','#e2ebf3'], borderWidth: 0, circumference: 220, rotation: 250 }] },
    options: { responsive:true, maintainAspectRatio:false, cutout:'58%', plugins:{ legend:{ display:false }, tooltip:{ enabled:false } } }
  });
}
function fakeSeries(field='pt', len=14){
  const base = currentDevice() || {};
  return Array.from({length: len}, (_,i) => {
    const val = Number(base[field] || base.pt || 0);
    return Math.max(0, val * (.65 + Math.sin(i/2) * .18 + (i % 3) * .04));
  });
}

        <div class="cfg-grid">
          ${panel('Geral', `<div class="form-grid" style="grid-template-columns:1fr 1fr"><div class="field"><label class="label">Nome da area / empresa</label><input class="input" id="cfgAreaName" value="${selectedName}"></div><div class="field"><label class="label">ID do equipamento</label><input class="input" value="${selectedId}" readonly></div><div class="field"><label class="label">Predio principal?</label><input class="input" value="Esse e o seu predio principal?"></div><div class="field"><label class="label">Antecessor</label><input class="input" value="SENAI"></div></div><h2 class="section-title">Energia</h2><div class="form-grid" style="grid-template-columns:1fr 1fr"><div class="field"><label class="label">Dia do fechamento de conta</label><input class="input" value="1"></div><div class="field"><label class="label">Meta mensal de consumo</label><input class="input" id="cfgGoal" value="4000"></div><div class="field"><label class="label">Tensao</label><select class="select"><option>220 Volts</option></select></div><div class="field"><label class="label">Numero de fases</label><select class="select"><option>Trifasico (3)</option></select></div></div>`)}
          ${panel('Tarifas', `<div class="field"><label class="label">Tipo predio</label><select class="select"><option>Industrial</option></select></div><div class="field"><label class="label">Concessionaria</label><input class="input" value="Energisa_PB"></div><div class="field"><label class="label">Modalidade tarifaria</label><input class="input" value="Tarifa Verde"></div><div class="field"><label class="label">Demanda fora ponta</label><input class="input" value="30 kW"></div><h2 class="section-title">Opcoes</h2><div class="field"><label class="label">Deseja receber relatorios por email?</label><input class="input" value="Deseja receber relatorios por email?"></div><div class="field"><label class="label">Tipo de medicao</label><select class="select"><option>Consumo</option></select></div>`)}
        </div>
      </section>
    </div>`;
}
function deviceOptions(){
  const list = devices.length ? devices : demoDevices();
  return list.map(d => `<option value="${deviceId(d)}">${deviceName(d)}</option>`).join('');
}
function demoDevices(){
  return ['SVX-ENERGIA-001','SVX-ENERGIA-002','SVX-ENERGIA-003','SVX-ENERGIA-004','SVX-ENERGIA-005','SVX-ENERGIA-006','SVX-ENERGIA-007','SVX-ENERGIA-008','SVX-ENERGIA-009','SVX-ENERGIA-010','SVX-ENERGIA-011','SVX-ENERGIA-012'].map((device,i)=>({ device, pt: i % 4 ? (i+1)*52 : 0, pa:(i+1)*12, pb:(i+1)*9, pc:(i+1)*7, va:220+i, vb:219+i, vc:221+i, ia:i*.7, ib:i*.5, ic:i*.6, fpt:.91, hz:60, tc:31+i/3, created_at: new Date(Date.now()-i*17000).toISOString() }));
}
async function loadGroupNames(){
  try {
    const res = await fetch(`${API}/grupos`);
    if (!res.ok) throw new Error('grupos');
    const rows = await res.json();
    groupNames = {};
    if (Array.isArray(rows)) rows.forEach(r => {
      if (r.dispositivo && r.nome_grupo) groupNames[r.dispositivo] = r.nome_grupo;
    });
  } catch {
    groupNames = {};
  }
}
async function refreshData(){
  try {
    const res = await fetch(`${API}/api/dashboard`);
    if (!res.ok) throw new Error('api');
    const data = await res.json();
    devices = Array.isArray(data) && data.length ? data : demoDevices();
    ensureSelectedDevice();
    document.getElementById('livePill').innerHTML = '<span class="status-dot online"></span>Online';
  } catch {
    devices = demoDevices();
    ensureSelectedDevice();
    document.getElementById('livePill').innerHTML = '<span class="status-dot warning"></span>Demo';
  }
  renderAll();
}
function renderAll(){
  renderAreaSelect();
  renderDashboards(); renderHome(); renderMonitor(); renderHistorico(); renderAnalise(); renderFaturamento(); renderGeracao(); renderRelatorios(); renderAlertas(); renderDownloads(); renderConfig();
  syncSelectionControls();
}
function drawHome(){
  const labels = Array.from({length:12}, (_,i)=>`${String(8+i).padStart(2,'0')}:00`);
  makeLine('homeDemand', labels, [{ label:'Demanda', data:fakeSeries('pt',12), borderColor:'#23628f', backgroundColor:'rgba(35,98,143,.12)', tension:.35, fill:true }], 'W');
  makeGauge('effGauge', 6.8, 10);
}
async function fetchHistoryByWindow(device, seconds, limit = 5000){
  const safeSeconds = Math.min(Math.max(parseInt(seconds, 10) || 30, 1), 30 * 24 * 3600);
  const res = await fetch(`${API}/api/historico/${encodeURIComponent(device)}?janela=${safeSeconds}&limit=${limit}`);
  if (!res.ok) throw new Error('historico');
  const rows = await res.json();
  if (!Array.isArray(rows) || !rows.length) return [];

  const dated = rows
    .filter(r => r.created_at && !isNaN(new Date(r.created_at).getTime()))
    .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  if (!dated.length) return rows;

  const latestTs = new Date(dated[dated.length - 1].created_at).getTime();
  const minTs = latestTs - safeSeconds * 1000;
  return dated.filter(r => new Date(r.created_at).getTime() >= minTs);
}
function rowsAsc(rows){
  return rows.slice().sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
}
function rowLabels(rows){
  return rows.map((r, i) => r.created_at ? new Date(r.created_at).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit', second:'2-digit' }) : String(i + 1));
}
async function drawMonitor(){
  const selected = document.getElementById('deviceSelect')?.value || ensureSelectedDevice();
  if (selected !== selectedDeviceId) setSelectedDevice(selected);
  const metric = document.getElementById('metricSelect')?.value || 'pt';
  const windowInput = document.getElementById('monitorWindow');
  const seconds = Math.min(Math.max(parseInt(windowInput?.value, 10) || 30, 1), 30 * 24 * 3600);
  if (windowInput) windowInput.value = seconds;
  localStorage.setItem('svoltix_window_seconds', seconds);
  let rows = [];
  try {
    rows = await fetchHistoryByWindow(selectedDeviceId, seconds);
  } catch {
    rows = [currentDevice()];
  }
  const ordered = rowsAsc(rows.length ? rows : [currentDevice()]);
  const labels = rowLabels(ordered);
  const total = ordered.map(r => Number(r[metric] ?? r.pt ?? 0));
  makeLine('monitorLine', labels, [
    { label:'Total', data: total, borderColor:'#23628f', tension:.35 },
    { label:'Fase A', data: ordered.map(r => Number(r.pa ?? r.va ?? 0)), borderColor:'#fbbf24', tension:.35 },
    { label:'Fase B', data: ordered.map(r => Number(r.pb ?? r.vb ?? 0)), borderColor:'#34d399', tension:.35 },
    { label:'Fase C', data: ordered.map(r => Number(r.pc ?? r.vc ?? 0)), borderColor:'#f87171', tension:.35 }
  ], 'Potencia');
  const latest = ordered[ordered.length - 1] || currentDevice();
  const gaugeValues = [
    Number(latest.pt || 0) / 1000,
    Number(latest.pa || 0) / 1000,
    Number(latest.pb || 0) / 1000,
    Number(latest.pc || 0) / 1000
  ];
  gaugeValues.forEach((v, i) => {
    makeGauge(`gauge${i}`, Math.max(0.01, Math.abs(v)), 10);
    const el = document.getElementById(`gaugeVal${i}`);
    if (el) el.textContent = `${num(v,2)} kW`;
  });
}
async function loadHistory(){
  const dev = document.getElementById('histDevice')?.value || ensureSelectedDevice();
  if (dev !== selectedDeviceId) setSelectedDevice(dev);
  const metric = document.getElementById('histMetric')?.value || 'pt';
  const seconds = Math.min(Math.max(parseInt(document.getElementById('histWindow')?.value, 10) || 300, 1), 30 * 24 * 3600);
  localStorage.setItem('svoltix_window_seconds', seconds);
  const out = document.getElementById('histOutput');
  out.className = '';
  out.innerHTML = panel(`Resultado historico - ${deviceName(currentDevice())} - ultimos ${seconds}s`, '<div class="chart-box tall"><canvas id="histChart"></canvas></div>');
  try {
    const rows = await fetchHistoryByWindow(dev, seconds);
    historyRows = Array.isArray(rows) && rows.length ? rows : demoDevices();
  } catch { historyRows = demoDevices(); }
  const ordered = rowsAsc(historyRows);
  const labels = rowLabels(ordered);
  const data = ordered.map(r => Number(r[metric] || r.pt || 0));
  makeLine('histChart', labels, [{ label: metric.toUpperCase(), data, borderColor:'#23628f', backgroundColor:'rgba(35,98,143,.08)', fill:true, tension:.3 }], metric);
}
async function drawAnalysis(){
  const dev = document.getElementById('anaDevice')?.value || ensureSelectedDevice();
  if (dev !== selectedDeviceId) setSelectedDevice(dev);
  let rows = [];
  try { rows = await fetchHistoryByWindow(selectedDeviceId, localStorage.getItem('svoltix_window_seconds') || 300); }
  catch { rows = [currentDevice()]; }
  const ordered = rowsAsc(rows.length ? rows : [currentDevice()]);
  const values = ordered.map(r => Number(r.pt || 0));
  const avg = values.length ? values.reduce((a,b)=>a+b,0) / values.length : 0;
  const out = document.getElementById('analysisOutput');
  out.className = '';
  out.innerHTML = `<div class="cards grid-2">${panel(`Curva de consumo - ${deviceName(currentDevice())}`, '<div class="chart-box"><canvas id="analysisChart"></canvas></div>')}${panel('Resumo', `<div class="metric-list"><div class="metric-line"><span>Media</span><b>${num(avg/1000,2)} kW</b></div><div class="metric-line"><span>Pico</span><b>${num((Math.max(...values,0))/1000,2)} kW</b></div><div class="metric-line"><span>Fator de potencia</span><b>${num(totals().fp,2)}</b></div></div>`)}</div>`;
  makeLine('analysisChart', rowLabels(ordered), [{ label:'Consumo', data:values, borderColor:'#23628f', tension:.35 }], 'W');
}
function drawGeneration(){
  const out = document.getElementById('generationOutput');
  out.className = '';
  out.innerHTML = panel('Geracao por periodo', '<div class="chart-box"><canvas id="generationChart"></canvas></div>');
  makeLine('generationChart', Array.from({length:12}, (_,i)=>`${i+6}h`), [{ label:'Geracao', data:fakeSeries('pt',12).map(v=>v*.42), borderColor:'#34d399', backgroundColor:'rgba(52,211,153,.1)', fill:true, tension:.35 }], 'W');
}
function exportCSV(){
  const rows = historyRows.length ? historyRows : devices;
  const cols = ['created_at','device','va','vb','vc','ia','ib','ic','pa','pb','pc','pt','fpt','hz','tc'];
  const csv = [cols.join(','), ...rows.map(r => cols.map(c => `"${String(r[c] ?? '').replace(/"/g,'""')}"`).join(','))].join('\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `svoltix_export_${today()}.csv`;
  a.click();
  a.remove();
  toast('CSV exportado');
}
function saveSettings(){
  const name = document.getElementById('cfgAreaName')?.value.trim();
  const goal = document.getElementById('cfgGoal')?.value;
  if (goal) localStorage.setItem('svoltix_goal', goal);
  if (!selectedCfgDevice || !name) { toast('Informe o nome da area'); return; }
  groupNames[selectedCfgDevice] = name;
  fetch(`${API}/grupos`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ dispositivo: selectedCfgDevice, nome_grupo: name })
  })
    .then(r => {
      if (!r.ok) throw new Error('save');
      toast('Nome salvo no banco');
      renderAll();
      go('config');
    })
    .catch(() => toast('Nao foi possivel salvar no banco'));
}
function selectCfgDevice(id){
  selectedCfgDevice = id;
  renderConfig();
}
function sair(){
  localStorage.removeItem('logado');
  location.href = 'index.html';
}
function init(){
  document.getElementById('userName').textContent = localStorage.getItem('usuario') || 'IST EFICIENCIA';
  renderNav();
  loadGroupNames().then(refreshData);
  setInterval(refreshData, Number(localStorage.getItem('svoltix_interval') || 15) * 1000);
}
init();
</script>
