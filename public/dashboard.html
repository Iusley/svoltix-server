<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SVoltix Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<style>

/* Layout inspirado no LiteMe (header + side menu + área de conteúdo) */

.layout{
    display:flex;
    gap:18px;
    align-items:stretch;
    margin-top:18px;
}

.side-menu{
    width:250px;
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:16px;
    padding:18px;
    height:fit-content;
}

.side-brand{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
}

.side-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:18px;
}

.side-section-label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin:16px 0 10px;
    padding-bottom:8px;
    border-bottom:1px solid var(--panel-border);
}

.side-item{
    width:100%;
    background:transparent;
    border:1px solid transparent;
    color:var(--text-muted);
    padding:10px 12px;
    border-radius:10px;
    cursor:pointer;
    font-weight:700;
    font-size:13px;
    font-family:inherit;
    text-align:left;
    transition:background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
}

.side-item:hover{
    background:rgba(94,234,212,0.06);
    border-color:rgba(94,234,212,0.15);
    color:var(--text);
}

.side-item.active{
    background:rgba(94,234,212,0.10);
    border-color:rgba(94,234,212,0.35);
    color:var(--text);
}

.side-user{
    font-size:13px;
    color:var(--text-muted);
    margin-bottom:10px;
    font-weight:700;
}

.side-logout{
    width:100%;
    margin-top:10px;
    background:transparent;
    border:1px solid rgba(248,113,113,0.35);
    color:var(--danger);
    padding:10px 12px;
    border-radius:10px;
    cursor:pointer;
    font-weight:800;
    font-size:13px;
    font-family:inherit;
    transition:background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
}

.side-logout:hover{
    background:rgba(248,113,113,0.10);
    border-color:var(--danger-hover);
}

.content{
    flex:1;
    min-width:0;
}

.content-header{
    margin-bottom:12px;
}

.content-body{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:16px;
    padding:18px;
}

.historico-toolbar{
    display:flex;
    gap:10px;
    align-items:flex-end;
    flex-wrap:wrap;
    margin-bottom:12px;
}

.field-row{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-muted);
}

.select{
    background:var(--bg-soft);
    border:1px solid var(--panel-border);
    color:var(--text);
    padding:10px 12px;
    border-radius:10px;
    min-width:220px;
    outline:none;
}

.btn-primary{
    background:var(--accent);
    color:#04141f;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    font-weight:900;
    cursor:pointer;
    transition:background 0.15s ease, transform 0.05s ease;
}

.btn-primary:hover{ background:#7ff3df; }
.btn-primary:active{ transform:scale(0.99); }

.hist-list{
    margin-top:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.hist-item{
    background:var(--bg-soft);
    border:1px solid var(--panel-border);
    border-radius:12px;
    padding:14px 14px;
}

.hist-item-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:10px;
}

.hist-device{
    font-weight:900;
}

.hist-time{
    font-family:'JetBrains Mono',monospace;
    color:var(--text-muted);
    font-size:11px;
}

.hist-grid{
    display:grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap:10px;
}

.hist-kv{
    background:rgba(94,234,212,0.06);
    border:1px solid rgba(94,234,212,0.12);
    border-radius:10px;
    padding:10px;
}

.hist-k{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-muted);
}

.hist-v{
    margin-top:6px;
    font-weight:900;
    color:var(--accent);
    font-family:'JetBrains Mono',monospace;
}

@media (max-width:980px){
    body{ padding:24px 14px; }
    .layout{ flex-direction:column; }
    .side-menu{ width:100%; }
}

@media (max-width:480px){
    .hist-grid{ grid-template-columns:1fr; }
}

:root{
    --bg: #0b1220;
    --bg-soft: #0f1a2e;
    --panel: #121d33;
    --panel-border: #223252;
    --text: #e7edf7;
    --text-muted: #8ea0bd;
    --accent: #5eead4;
    --accent-soft: rgba(94,234,212,0.12);
    --online: #34d399;
    --warning: #fbbf24;
    --offline: #f87171;
    --danger: #f87171;
    --danger-hover: #ef4444;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',Arial,sans-serif;
    background:
        radial-gradient(circle at 15% 0%, rgba(94,234,212,0.08), transparent 40%),
        radial-gradient(circle at 85% 100%, rgba(94,234,212,0.05), transparent 45%),
        var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:32px 20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:18px;
    padding:32px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:28px;
    gap:16px;
    flex-wrap:wrap;
}

.brand{
    display:flex;
    align-items:center;
    gap:12px;
}

.brand-mark{
    width:42px;
    height:42px;
    border-radius:10px;
    background:var(--accent-soft);
    border:1px solid rgba(94,234,212,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}

.brand-mark svg{
    width:22px;
    height:22px;
}

h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:24px;
    font-weight:700;
    letter-spacing:0.01em;
    color:var(--text);
    line-height:1.2;
}

.subtitle{
    color:var(--text-muted);
    font-size:13px;
    margin-top:2px;
    display:flex;
    align-items:center;
    gap:8px;
}

.live-dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--online);
    box-shadow:0 0 0 0 rgba(52,211,153,0.6);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%   { box-shadow:0 0 0 0 rgba(52,211,153,0.55); }
    70%  { box-shadow:0 0 0 6px rgba(52,211,153,0); }
    100% { box-shadow:0 0 0 0 rgba(52,211,153,0); }
}

.topbar-right{
    display:flex;
    align-items:center;
    gap:14px;
}

#usuarioLogado{
    font-size:13px;
    color:var(--text-muted);
    text-align:right;
}

#usuarioLogado b{
    color:var(--text);
    font-weight:600;
}

.logout{
    background:transparent;
    color:var(--danger);
    border:1px solid rgba(248,113,113,0.4);
    border-radius:8px;
    padding:9px 18px;
    cursor:pointer;
    font-size:13px;
    font-weight:600;
    font-family:inherit;
    transition:background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
}

.logout:hover{
    background:rgba(248,113,113,0.1);
    border-color:var(--danger-hover);
    color:#fca5a5;
}

.section-label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin-bottom:14px;
    padding-bottom:10px;
    border-bottom:1px solid var(--panel-border);
}

.equipamentos-grid{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.grupo{
    background:var(--bg-soft);
    border:1px solid var(--panel-border);
    border-radius:12px;
    overflow:hidden;
}

.grupo-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 18px;
    cursor:pointer;
    user-select:none;
    transition:background 0.15s ease;
}

.grupo-header:hover{
    background:rgba(94,234,212,0.04);
}

.grupo-header-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.chevron{
    width:16px;
    height:16px;
    color:var(--text-muted);
    transition:transform 0.2s ease;
    flex-shrink:0;
}

.grupo.collapsed .chevron{
    transform:rotate(-90deg);
}

.grupo.collapsed .grupo-body{
    max-height:0;
}

.grupo-icon{
    width:18px;
    height:18px;
    color:var(--text-muted);
    flex-shrink:0;
}

.grupo-nome{
    font-weight:600;
    font-size:14px;
    color:var(--text);
}

.grupo-edit-btn{
    width:28px;
    height:28px;
    border-radius:6px;
    border:none;
    background:transparent;
    color:var(--text-muted);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition:background 0.15s ease, color 0.15s ease;
}

.grupo-edit-btn:hover{
    background:var(--accent-soft);
    color:var(--accent);
}

.grupo-edit-btn svg{
    width:14px;
    height:14px;
}

.grupo-nome-input{
    font-family:inherit;
    font-weight:600;
    font-size:14px;
    color:var(--text);
    background:var(--panel);
    border:1px solid var(--accent);
    border-radius:6px;
    padding:4px 8px;
    outline:none;
    width:180px;
}

.grupo-resumo{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-muted);
    text-transform:uppercase;
    letter-spacing:0.06em;
}

.grupo-resumo.online{ color:var(--online); background:none; box-shadow:none; }
.grupo-resumo.warning{ color:var(--warning); background:none; box-shadow:none; }
.grupo-resumo.offline{ color:var(--offline); background:none; box-shadow:none; }

.grupo-body{
    max-height:200px;
    transition:max-height 0.25s ease;
}

.equipamento{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 18px 16px 46px;
    border-top:1px solid var(--panel-border);
    transition:background 0.15s ease;
}

.equipamento:hover{
    background:rgba(94,234,212,0.03);
}

.info{
    display:flex;
    align-items:center;
    gap:14px;
}

.status{
    width:10px;
    height:10px;
    border-radius:50%;
    flex-shrink:0;
}

.online{
    background:var(--online);
    box-shadow:0 0 0 3px rgba(52,211,153,0.18);
}

.warning{
    background:var(--warning);
    box-shadow:0 0 0 3px rgba(251,191,36,0.18);
}

.offline{
    background:var(--offline);
    box-shadow:0 0 0 3px rgba(248,113,113,0.18);
}

.nome{
    font-weight:600;
    color:var(--text);
    font-size:15px;
}

.status-text{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-muted);
    text-transform:uppercase;
    letter-spacing:0.08em;
}

.valor{
    font-family:'JetBrains Mono',monospace;
    font-size:20px;
    font-weight:600;
    color:var(--accent);
}

.empty, .erro{
    padding:40px 20px;
    text-align:center;
    color:var(--text-muted);
    font-size:14px;
}

.erro{
    color:var(--danger);
}

@media (max-width:480px){
    .card{ padding:22px; }
    .topbar{ flex-direction:column; }
    .topbar-right{ width:100%; justify-content:space-between; }
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="topbar">

<div class="brand">

<div class="brand-mark">
<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M13 2L4 14H11L10 22L20 10H13L14 2Z" stroke="#5eead4" stroke-width="1.6" stroke-linejoin="round" fill="rgba(94,234,212,0.15)"/>
</svg>
</div>

<div>
<h1>SVoltix</h1>
<div class="subtitle">
<span class="live-dot"></span>
Monitoramento em tempo real
</div>
</div>

</div>

<div class="topbar-right">
<div id="usuarioLogado"></div>
<button class="logout" onclick="sair()">Sair</button>
</div>

</div>

<!-- Layout LiteMe-like: header + menu lateral + área de conteúdo -->
<div class="layout">

<div class="side-menu" id="sideMenu">
    <div class="side-brand">
        <span class="side-title">SVoltix</span>
    </div>

    <div class="side-section-label">Navegação</div>

    <button class="side-item active" id="tab-dashboard" onclick="selecionarTab('dashboard')">Dashboard</button>
    <button class="side-item" id="tab-historico" onclick="selecionarTab('historico')">Histórico</button>
    <button class="side-item" id="tab-config" onclick="selecionarTab('config')">Configurações</button>

    <div class="side-section-label">Usuário</div>
    <div class="side-user" id="usuarioLogado"></div>
</div>

<div class="content">
    <div class="content-header">
        <div class="section-label">Dashboard</div>
    </div>

    <div class="content-body">
        <div id="view-dashboard">
            <div class="section-label">Equipamentos</div>
            <div class="equipamentos-grid" id="equipamentos">
                <div class="empty">Carregando equipamentos...</div>
            </div>
        </div>

<div id="view-historico" style="display:none">
            <div class="section-label">Histórico</div>
            <div class="historico-toolbar">
                <div class="field-row">
                    <label class="label">Dispositivo</label>
                    <select id="selectDevice" class="select"></select>
                </div>
                <button class="btn-primary" onclick="carregarHistorico()">Carregar</button>
            </div>

            <div class="empty" id="historicoEmpty">Selecione um dispositivo.</div>
            <div class="hist-list" id="historicoList"></div>

<div style="margin-top:18px; display:none;" id="historicoCharts">
                <div class="section-label" style="margin-bottom:10px;">Gráficos</div>

                <div class="historico-plot-tabs" style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px;">
                    <div class="field-row">
                        <label class="label">Período</label>
                        <select id="selectHistoricoPeriodo" class="select" style="min-width:200px;">
                            <option value="1h">Última 1h</option>
                            <option value="6h">Últimas 6h</option>
                            <option value="24h" selected>Últimas 24h</option>
                            <option value="7d">Últimos 7 dias</option>
                        </select>
                    </div>

                    <div class="field-row" style="min-width:260px;">
                        <label class="label">Variáveis no gráfico</label>
                        <div style="display:flex; gap:12px; flex-wrap:wrap;">
                            <label style="display:flex; gap:8px; align-items:center; font-weight:900; font-size:13px; color:var(--text-muted);">
                                <input type="checkbox" id="chkVA" checked /> Tensão (VA/VB/VC)
                            </label>
                            <label style="display:flex; gap:8px; align-items:center; font-weight:900; font-size:13px; color:var(--text-muted);">
                                <input type="checkbox" id="chkPA" checked /> Potência (PA/PB/PC)
                            </label>
                            <label style="display:flex; gap:8px; align-items:center; font-weight:900; font-size:13px; color:var(--text-muted);">
                                <input type="checkbox" id="chkFP" checked /> FP (FPA/FPB/FPC)
                            </label>
                            <label style="display:flex; gap:8px; align-items:center; font-weight:900; font-size:13px; color:var(--text-muted);">
                                <input type="checkbox" id="chkHZ" /> HZ
                            </label>
                            <label style="display:flex; gap:8px; align-items:center; font-weight:900; font-size:13px; color:var(--text-muted);">
                        </div>
                            </label>
                    </div>

                    <button class="btn-primary" style="padding:9px 12px; border-radius:10px;" onclick="carregarHistorico()">Atualizar</button>
                    <button class="btn-primary" style="padding:9px 12px; border-radius:10px; background:rgba(94,234,212,0.18);" onclick="downloadHistoricoSelecionado()">Download</button>
                </div>

                <div style="display:grid; grid-template-columns:1fr; gap:14px;">
            <div class="hist-item" id="wrapChartPt">
                        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:10px;">
                            <div style="font-weight:900;">Tensão (VA/VB/VC)</div>
                            <div style="font-family:'JetBrains Mono',monospace; color:var(--text-muted); font-size:11px;" id="metaPt">-</div>
                        </div>
                        <div style="height:220px; min-height:220px;">
                            <canvas id="chartPt" height="120" style="width:100%; height:220px;"></canvas>
                        </div>
                    </div>

                    <div class="hist-item" id="wrapChartVafp" style="display:none">
                        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:10px;">
                            <div style="font-weight:900;">VA / IA / FP</div>
                            <div style="font-family:'JetBrains Mono',monospace; color:var(--text-muted); font-size:11px;" id="metaVafp">-</div>
                        </div>
                        <div style="height:260px; min-height:260px;">
                            <canvas id="chartVafp" height="160" style="width:100%; height:260px;"></canvas>
                        </div>
                    </div>

                    <div class="hist-item" id="wrapChartHzTc" style="display:none">
                        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:10px;">
                            <div style="font-weight:900;">HZ / TC</div>
                            <div style="font-family:'JetBrains Mono',monospace; color:var(--text-muted); font-size:11px;" id="metaHzTc">-</div>
                        </div>
                        <div style="height:260px; min-height:260px;">
                            <canvas id="chartHzTc" height="160" style="width:100%; height:260px;"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-config" style="display:none">
            <div class="section-label">Configurações</div>
            <div class="empty">Em breve.</div>
        </div>
    </div>
</div>

</div>

</div>

</div>

<script>

if(localStorage.getItem("logado") != "sim")
{
    location.href = "index.html";
}

document.getElementById(
    "usuarioLogado"
).innerHTML =
"<b>Usuário:</b> " +
localStorage.getItem("usuario");

const gruposColapsados =
    new Set();

let nomesGrupos = {};

let editandoGrupoId = null;

const API =
'https://evidence-spider-inclusive-venice.trycloudflare.com';


function toggleGrupo(grupoId)
{
    const el =
        document.getElementById(
            grupoId);

    if(!el) return;

    if(gruposColapsados.has(
        grupoId))
    {
        gruposColapsados.delete(
            grupoId);

        el.classList.remove(
            "collapsed");
    }
    else
    {
        gruposColapsados.add(
            grupoId);

        el.classList.add(
            "collapsed");
    }
}

function editarNomeGrupo(
    dispositivo,
    grupoId)
{
    editandoGrupoId = grupoId;

    const nomeAtual =
        nomesGrupos[dispositivo]
        || dispositivo;

    const span =
        document.getElementById(
            "nome-" + grupoId);

    if(!span) return;

    const input =
        document.createElement(
            "input");

    input.type = "text";
    input.className =
        "grupo-nome-input";
    input.value = nomeAtual;

    input.onclick = e =>
        e.stopPropagation();

    input.onkeydown = e =>
    {
        if(e.key === "Enter")
        {
            input.blur();
        }
        if(e.key === "Escape")
        {
            input.value =
                nomeAtual;

            input.blur();
        }
    };

    input.onblur = () =>
        salvarNomeGrupo(
            dispositivo,
            grupoId,
            input.value
                .trim()
                || dispositivo);

    span.replaceWith(input);

    input.focus();

    input.select();
}

async function salvarNomeGrupo(
    dispositivo,
    grupoId,
    novoNome)
{
    editandoGrupoId = null;

    nomesGrupos[dispositivo] =
        novoNome;

    const span =
        document.createElement(
            "span");

    span.id =
        "nome-" + grupoId;

    span.className =
        "grupo-nome";

    span.textContent =
        novoNome;

    const input =
        document.getElementById(

{

    if(tab === 'dashboard')
    {
        document.getElementById('tab-dashboard').classList.add('active');
        document.getElementById('view-dashboard').style.display = 'block';

        document.getElementById('view-config').style.display = 'none';

        document.getElementById('view-dashboard').style.display = 'none';
        document.getElementById('view-historico').style.display = 'block';

async function carregarDispositivosParaHistorico()
{

    if(!sel) return;

    try
    {
        sel.disabled = true;
        empty.textContent = 'Carregando dispositivos...';

        const res = await fetch(`${API}/api/dispositivos`);
        const dados = await res.json();

        sel.innerHTML = '';

        dados.forEach(d =>
        {

            opt.value = d.device;

let chartPt = null;
let chartVafp = null;
let chartHzTc = null;

function destruirGraficos()
{
    if(chartPt) { chartPt.destroy(); chartPt = null; }
    if(chartVafp) { chartVafp.destroy(); chartVafp = null; }
    if(chartHzTc) { chartHzTc.destroy(); chartHzTc = null; }
}

function formatTime(x)
{
    if(!x) return '';
    const d = new Date(x);
    if(Number.isNaN(d.getTime())) return '';
    return d.toLocaleString();
}

function safeNum(v)
{
    const n = Number(v);
    if(!Number.isFinite(n)) return 0;
    // garante que valores (potência e FP) não sejam desenhados como negativos
    // (mesmo que apareçam por ruído/DB/cálculo)
    return n;
}

function safeNonNegativeNum(v)
{
    const n = Number(v);
    if(!Number.isFinite(n)) return 0;
    return n < 0 ? 0 : n;
}

function selecionarTipoGrafico(tipo)
{
    // evita re-inicializar gráficos: apenas mostra/esconde wrappers.
    const wrapPt = document.getElementById('wrapChartPt');
    const wrapVafp = document.getElementById('wrapChartVafp');
    const wrapHzTc = document.getElementById('wrapChartHzTc');

    if(!wrapPt || !wrapVafp || !wrapHzTc) return;

    // default: power
    wrapPt.style.display = 'none';
    wrapVafp.style.display = 'none';
    wrapHzTc.style.display = 'none';

    if(tipo === 'power') wrapPt.style.display = 'block';
    else if(tipo === 'vafp') wrapVafp.style.display = 'block';
    else if(tipo === 'hz_tc') wrapHzTc.style.display = 'block';

    // force Chart.js to recalc when container becomes visible
    if(tipo === 'power' && chartPt) chartPt.resize();
    if(tipo === 'vafp' && chartVafp) chartVafp.resize();
    if(tipo === 'hz_tc' && chartHzTc) chartHzTc.resize();
}

function atualizarGraficos(dados)
{
    if(!dados || dados.length === 0) return;

    const showVA = document.getElementById('chkVA')?.checked ?? false; // tensão por fase (VA/VB/VC)
    const showPA = document.getElementById('chkPA')?.checked ?? false; // potência por fase (PA/PB/PC)
    const showFP = document.getElementById('chkFP')?.checked ?? false; // FP por fase (FPA/FPB/FPC)
    const showHZ = document.getElementById('chkHZ')?.checked ?? false;
    const showTC = document.getElementById('chkTC')?.checked ?? false;

    // backend ordena por id DESC; para gráfico temporal crescente, invertimos.
    const series = dados.slice().reverse();
    const labels = series.map(item => formatTime(item.created_at));

    // séries por fase
    const va = series.map(item => safeNum(item.va));
    const vb = series.map(item => safeNum(item.vb));
    const vc = series.map(item => safeNum(item.vc));

    const pa = series.map(item => safeNum(item.pa));
    const pb = series.map(item => safeNum(item.pb));
    const pc = series.map(item => safeNum(item.pc));

    const fpa = series.map(item => safeNum(item.fpa));
    const fpb = series.map(item => safeNum(item.fpb));
    const fpc = series.map(item => safeNum(item.fpc));

    const hz = series.map(item => safeNum(item.hz));
    const tc = series.map(item => safeNum(item.tc));

    const meta = series[series.length - 1];

    const metaPt = document.getElementById('metaPt');
    const metaVafp = document.getElementById('metaVafp');
    const metaHzTc = document.getElementById('metaHzTc');

    if(metaPt)
    {
        metaPt.textContent = meta
            ? `VA ${safeNum(meta.va).toFixed(1)}V | VB ${safeNum(meta.vb).toFixed(1)}V | VC ${safeNum(meta.vc).toFixed(1)}V`
            : '-';
    }

    if(metaVafp)
    {
        // campo metaVafp agora mostra PA/PB/PC e FP por fase
        metaVafp.textContent = meta
            ? `PA ${safeNum(meta.pa).toFixed(0)}W | PB ${safeNum(meta.pb).toFixed(0)}W | PC ${safeNum(meta.pc).toFixed(0)}W | FP ${safeNum(meta.fpa).toFixed(3)}/${safeNum(meta.fpb).toFixed(3)}/${safeNum(meta.fpc).toFixed(3)}`
            : '-';
    }

    if(metaHzTc)
    {
        metaHzTc.textContent = meta
            ? `HZ ${safeNum(meta.hz).toFixed(2)} | TC ${safeNum(meta.tc).toFixed(2)}`
            : '-';
    }

    const common = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { labels: { color: '#8ea0bd' } },
            tooltip: { mode: 'index', intersect: false }
        },
        scales: {
            x: { ticks: { color: '#8ea0bd' }, grid: { color: 'rgba(142,160,189,0.12)' } },
            y: { ticks: { color: '#e7edf7' }, grid: { color: 'rgba(142,160,189,0.12)' } }
        }
    };

    // wrappers: visibilidade conforme seleção
    const wrapChartPt = document.getElementById('wrapChartPt');
    const wrapChartVafp = document.getElementById('wrapChartVafp');
    const wrapChartHzTc = document.getElementById('wrapChartHzTc');

    if(wrapChartPt) wrapChartPt.style.display = showVA ? 'block' : 'none';
    if(wrapChartVafp) wrapChartVafp.style.display = (showPA || showFP) ? 'block' : 'none';
    if(wrapChartHzTc) wrapChartHzTc.style.display = (showHZ || showTC) ? 'block' : 'none';

    // PT -> na prática, VA (tensão por fase)
    const ctxPt = document.getElementById('chartPt');
    if(wrapChartPt && showVA && ctxPt)
    {
        chartPt = new Chart(ctxPt, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    {
                        label: 'VA (V) - A',
                        data: va,
                        borderColor: '#60a5fa',
                        backgroundColor: 'rgba(96,165,250,0.12)',
                        tension: 0.25,
                        pointRadius: 2
                    },
                    {
                        label: 'VB (V) - B',
                        data: vb,
                        borderColor: '#34d399',
                        backgroundColor: 'rgba(52,211,153,0.12)',
                        tension: 0.25,
                        pointRadius: 2
                    },
                    {
                        label: 'VC (V) - C',
                        data: vc,
                        borderColor: '#a78bfa',
                        backgroundColor: 'rgba(167,139,250,0.12)',
                        tension: 0.25,
                        pointRadius: 2
                    }
                ]
            },
            options: common
        });
    }

    // Vafp -> potência + FP (por fase)
    const ctxVafp = document.getElementById('chartVafp');
    if(wrapChartVafp && (showPA || showFP) && ctxVafp)
    {
        const datasets = [];

        if(showPA)
        {
            datasets.push(
                {
                    label: 'PA (W) - A',
                    data: pa,
                    borderColor: '#5eead4',
                    backgroundColor: 'rgba(94,234,212,0.12)',
                    tension: 0.25,
                    pointRadius: 2
                },
                {
                    label: 'PB (W) - B',
                    data: pb,
                    borderColor: '#fbbf24',
                    backgroundColor: 'rgba(251,191,36,0.12)',
                    tension: 0.25,
                    pointRadius: 2
                },
                {
                    label: 'PC (W) - C',
                    data: pc,
                    borderColor: '#f87171',
                    backgroundColor: 'rgba(248,113,113,0.12)',
                    tension: 0.25,
                    pointRadius: 2
                }
            );
        }

        if(showFP)
        {
            datasets.push(
                {
                    label: 'FPA - A',
                    data: fpa,
                    borderColor: '#60a5fa',
                    backgroundColor: 'rgba(96,165,250,0.12)',
                    tension: 0.25,
                    pointRadius: 2
                },
                {
                    label: 'FPB - B',
                    data: fpb,
                    borderColor: '#34d399',
                    backgroundColor: 'rgba(52,211,153,0.12)',
                    tension: 0.25,
                    pointRadius: 2
                },
                {
                    label: 'FPC - C',
                    data: fpc,
                    borderColor: '#a78bfa',
                    backgroundColor: 'rgba(167,139,250,0.12)',
                    tension: 0.25,
                    pointRadius: 2
                }
            );
        }

        chartVafp = new Chart(ctxVafp, {
            type: 'line',
            data: { labels, datasets },
            options: common
        });
    }

    // Hz/Tc
    const ctxHzTc = document.getElementById('chartHzTc');
    if(wrapChartHzTc && (showHZ || showTC) && ctxHzTc)
    {
        const datasets = [];
        if(showHZ)
        {
            datasets.push({
                label: 'HZ',
                data: hz,
                borderColor: '#a78bfa',
                backgroundColor: 'rgba(167,139,250,0.12)',
                tension: 0.25,
                pointRadius: 2
            });
        }
        if(showTC)
        {
            datasets.push({
                label: 'TC',
                data: tc,
                borderColor: '#f87171',
                backgroundColor: 'rgba(248,113,113,0.12)',
                tension: 0.25,
                pointRadius: 2
            });
        }

        chartHzTc = new Chart(ctxHzTc, {
            type: 'line',
            data: { labels, datasets },
            options: common
        });
    }
}


function baixarTextoComoArquivo(nome, texto)
{
    const blob = new Blob([texto], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = nome;
    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(url);
}

function getSelecionadosGrafico()
{
    const chkVA = document.getElementById('chkVA');
    const chkPA = document.getElementById('chkPA');
    const chkFP = document.getElementById('chkFP');
    const chkHZ = document.getElementById('chkHZ');
    const chkTC = document.getElementById('chkTC');

    return {
        va: !!chkVA?.checked,
        pa: !!chkPA?.checked,
        fp: !!chkFP?.checked,
        hz: !!chkHZ?.checked,
        tc: !!chkTC?.checked
    };
}

async function downloadHistoricoSelecionado()
{
    const device = document.getElementById('selectDevice').value;
    const periodo = document.getElementById('selectHistoricoPeriodo')?.value || '24h';

    if(!device)
    {
        alert('Selecione um dispositivo.');
        return;
    }

    const selecionados = getSelecionadosGrafico();

    // se nada estiver marcado, baixa tudo que o usuário já espera (va+pa+fp+hz+tc)
    const temAlgo = selecionados.va || selecionados.pa || selecionados.fp || selecionados.hz || selecionados.tc;
    const usar = temAlgo
        ? selecionados
        : { va: true, pa: true, fp: true, hz: true, tc: true };

    try
    {
        const res = await fetch(`${API}/api/historico/${encodeURIComponent(device)}`);
        const dados = await res.json();

        if(!dados || dados.length === 0)
        {
            alert('Sem dados para baixar.');
            return;
        }

        const cols = ['created_at', 'device'];
        if(usar.va) cols.push('va', 'vb', 'vc');
        if(usar.pa) cols.push('pa', 'pb', 'pc');
        if(usar.fp) cols.push('fpa', 'fpb', 'fpc');
        if(usar.hz) cols.push('hz');
        if(usar.tc) cols.push('tc');

        const esc = v => {
            const s = v === null || v === undefined ? '' : String(v);
            // csv simples
            return '"' + s.replace(/"/g,'""') + '"';
        };

        const linhas = [];
        linhas.push(cols.join(','));

        dados.forEach(item =>
        {
            const row = [];
            cols.forEach(c =>
            {
                if(c === 'device') row.push(esc(item.device ?? device));
                else row.push(esc(item[c]));
            });
            linhas.push(row.join(','));
        });

        const safeDevice = String(device).replace(/[^a-zA-Z0-9-_]/g, '_');
        const safePeriodo = String(periodo).replace(/[^a-zA-Z0-9-_]/g, '_');
        const nome = `historico_${safeDevice}_${safePeriodo}.csv`;

        baixarTextoComoArquivo(nome, linhas.join('\n'));
    }
    catch(err)
    {
        console.error(err);
        alert('Erro ao baixar dados.');
    }
}

async function carregarHistorico()
{
    const device = document.getElementById('selectDevice').value;
    const periodo = document.getElementById('selectHistoricoPeriodo')?.value || '24h';

    const historicoList = document.getElementById('historicoList');
    const historicoEmpty = document.getElementById('historicoEmpty');

    // Histórico: manter apenas gráficos. Limpa lista de valores.
    if(historicoList) historicoList.innerHTML = '';
    if(historicoEmpty) historicoEmpty.style.display = 'none';


    if(!device)
    {
        historicoEmpty.style.display = 'block';
        historicoList.innerHTML = '';
        return;
    }

    historicoEmpty.style.display = 'none';
    historicoList.innerHTML = '<div class="empty">Carregando...</div>';

    try
    {
        const res = await fetch(`${API}/api/historico/${encodeURIComponent(device)}`);
        const dados = await res.json();

        if(!dados || dados.length === 0)
        {
            destruirGraficos();
            const charts = document.getElementById('historicoCharts');
            if(charts) charts.style.display = 'none';
            historicoList.innerHTML = '<div class="empty">Sem histórico para este dispositivo.</div>';
            return;
        }

        historicoList.innerHTML = '';

        // Gráfico apenas (remove dados em lista)
        destruirGraficos();

        const charts = document.getElementById('historicoCharts');
        if(charts) charts.style.display = 'block';

        atualizarGraficos(dados);

        dados.forEach(item =>
        {
            const t = item.created_at ? new Date(item.created_at).toLocaleString() : '';

            // Apenas gráficos; não renderiza lista/valores textuais.
        });
    }
    catch(err)
    {
        console.error(err);
        historicoList.innerHTML = '<div class="erro">Erro ao carregar histórico.</div>';
        historicoEmpty.style.display = 'block';
        historicoEmpty.textContent = 'Erro ao consultar o servidor.';
    }
}
